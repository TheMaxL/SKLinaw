<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SK Linaw – Admin Panel</title>
  <link rel="stylesheet" href="shared.css"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body class="layout-sidebar">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">SK <span>Linaw</span><small>Admin Panel</small></div>
    <button class="nav-item active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      Pending Accounts
      <span class="nav-badge" id="admin-pending-badge">…</span>
    </button>
    <button class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <div class="sidebar-footer">
      <button class="nav-item" id="refresh-btn" style="margin-bottom:0.25rem">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        Refresh
      </button>
      <button class="nav-item" id="logout-btn" style="color:var(--rejected)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Log Out
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Admin Panel</div>
        <div class="page-subtitle">Review and approve SK councilor registration requests.</div>
      </div>
    </div>

    <div class="admin-stats">
      <div class="stat-card"><div class="stat-val" id="admin-stat-pending">—</div><div class="stat-lbl">Pending Review</div></div>
      <div class="stat-card"><div class="stat-val" id="admin-stat-approved">—</div><div class="stat-lbl">Approved Accounts</div></div>
      <div class="stat-card"><div class="stat-val" id="admin-stat-total">—</div><div class="stat-lbl">Total Councilors</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="pending">Pending</button>
      <button class="tab"        data-tab="approved">Approved</button>
      <button class="tab"        data-tab="all">All</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Name</th><th>Barangay</th><th>Photo / Proof</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="admin-table-body">
          <tr class="loader-row"><td colspan="5"><div class="loader"><span></span><span></span><span></span></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

<div class="toast" id="global-toast"></div>
<script src="shared.js"></script>
<script src="admin.js"></script>
</body>
</html>
