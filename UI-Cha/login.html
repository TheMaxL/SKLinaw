<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SK Linaw – Log In</title>
  <link rel="stylesheet" href="shared.css"/>
  <link rel="stylesheet" href="login.css"/>
</head>
<body>

<div class="card card-sm">
  <button class="back-link" onclick="location.href='home.html'">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Home
  </button>

  <div class="logo" style="font-size:1.3rem;margin-bottom:0.35rem">SK <span>Linaw</span></div>
  <div class="card-title">Welcome back</div>
  <div class="card-subtitle">Log in to your SK council account.</div>

  <div class="alert" id="login-alert"></div>

  <div class="form-group">
    <label>Full Name</label>
    <input class="form-input" type="text" id="login-name" placeholder="e.g. Juan Dela Cruz" autocomplete="name"/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <div class="input-wrap">
      <input class="form-input has-icon" type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password"/>
      <button class="input-icon-btn" type="button" onclick="togglePw()" title="Show/hide password">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <button class="btn btn-primary btn-full" id="login-btn" onclick="submitLogin()">Log In</button>

  <div class="divider">or</div>

  <div class="footer-link">
    Don't have an account?
    <button onclick="location.href='signup.html'">Sign up here</button>
  </div>
</div>

<div class="toast" id="global-toast"></div>
<script src="shared.js"></script>
<script src="login.js"></script>
</body>
</html>
