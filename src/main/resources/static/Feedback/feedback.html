<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SK Linaw – Feedback</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --teal:      #0BBFB5;
      --teal-dark: #089991;
      --teal-dim:  rgba(11,191,181,0.08);
      --bg:        #F0F7F7;
      --surface:   #FFFFFF;
      --border:    #D2ECEB;
      --text:      #0D2B2A;
      --muted:     #5A8A88;
      --error:     #EF4444;
      --success:   #10B981;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* HEADER */
    header { background: var(--text); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--teal); }
    .logo span { color: #fff; }
    .header-nav { display: flex; gap: 0.75rem; align-items: center; }
    .nav-link { color: #7AADAB; font-size: 0.82rem; text-decoration: none; transition: color 0.2s; }
    .nav-link:hover { color: var(--teal); }
    .btn-sk { background: var(--teal); color: #fff; border: none; border-radius: 7px; padding: 0.42rem 1rem; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem; cursor: pointer; text-decoration: none; transition: background 0.2s; }
    .btn-sk:hover { background: var(--teal-dark); }

    /* HERO */
    .hero { background: var(--text); padding: 3rem 2rem; text-align: center; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 130%, rgba(11,191,181,0.16) 0%, transparent 70%); pointer-events: none; }
    .hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(1.6rem, 4vw, 2.5rem); font-weight: 800; color: #fff; position: relative; }
    .hero h1 em { font-style: normal; color: var(--teal); }
    .hero p { color: #7AADAB; font-size: 0.95rem; margin-top: 0.65rem; font-weight: 300; position: relative; }

    /* LAYOUT */
    .main { max-width: 860px; margin: 2rem auto; padding: 0 1.5rem 4rem; }

    /* TABS */
    .tabs { display: flex; gap: 0.3rem; background: var(--surface); border: 1.5px solid var(--border); border-radius: 11px; padding: 4px; width: fit-content; margin-bottom: 1.75rem; }
    .tab { padding: 0.48rem 1.25rem; border-radius: 8px; font-size: 0.86rem; font-weight: 600; cursor: pointer; color: var(--muted); border: none; background: none; transition: all 0.2s; }
    .tab.active { background: var(--teal); color: #fff; }

    /* PANEL */
    .panel { display: none; }
    .panel.active { display: block; animation: fadeUp 0.3s ease; }

    /* ── GENERAL FEEDBACK PANEL ── */
    .feedback-form-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; padding: 1.75rem; margin-bottom: 1.5rem; }
    .form-title { font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 800; margin-bottom: 0.35rem; }
    .form-subtitle { font-size: 0.84rem; color: var(--muted); margin-bottom: 1.25rem; }

    /* REACTION PICKER */
    .reaction-row { display: flex; gap: 0.6rem; margin-bottom: 1.1rem; flex-wrap: wrap; }
    .reaction-btn { background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 0.5rem 0.9rem; font-size: 1.1rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.4rem; }
    .reaction-btn span { font-size: 0.75rem; font-weight: 600; color: var(--muted); }
    .reaction-btn:hover { border-color: var(--teal); background: var(--teal-dim); }
    .reaction-btn.selected { border-color: var(--teal); background: var(--teal-dim); }
    .reaction-btn.selected span { color: var(--teal); }

    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.73rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
    .form-group input,
    .form-group textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 0.65rem 0.9rem; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.2s; resize: vertical; }
    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--teal); }
    .char-count { font-size: 0.72rem; color: var(--muted); text-align: right; margin-top: 3px; }

    .btn-submit { background: var(--teal); color: #fff; border: none; border-radius: 10px; padding: 0.7rem 1.6rem; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.92rem; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-submit:hover { background: var(--teal-dark); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }

    .alert { display: none; border-radius: 8px; font-size: 0.82rem; padding: 0.65rem 0.9rem; margin-bottom: 1rem; }
    .alert.error   { background: rgba(239,68,68,0.08);  border: 1px solid rgba(239,68,68,0.2);  color: var(--error); }
    .alert.success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); color: var(--success); }
    .alert.show { display: block; }

    /* FEED */
    .feed-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .feed-title { font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    .feed-count { font-size: 0.75rem; color: var(--muted); }

    .comment-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 13px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; animation: fadeUp 0.3s ease both; transition: border-color 0.2s; }
    .comment-card:hover { border-color: var(--teal); }
    .comment-top { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.5rem; }
    .comment-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--teal-dim); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.78rem; color: var(--teal); flex-shrink: 0; }
    .comment-author { font-weight: 700; font-size: 0.86rem; }
    .comment-time { font-size: 0.72rem; color: var(--muted); margin-left: auto; white-space: nowrap; }
    .comment-reaction-badge { font-size: 0.9rem; }
    .comment-body { font-size: 0.88rem; line-height: 1.6; color: var(--text); }

    /* PROJECT COMMENTS PANEL */
    .project-search-wrap { margin-bottom: 1.25rem; }
    .project-search { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 0.6rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text); background: var(--surface); outline: none; transition: border-color 0.2s; }
    .project-search:focus { border-color: var(--teal); }

    .project-comment-block { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; margin-bottom: 1rem; overflow: hidden; }
    .pcb-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; cursor: pointer; transition: background 0.15s; }
    .pcb-header:hover { background: var(--bg); }
    .pcb-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; }
    .pcb-meta { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .pcb-right { display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
    .pcb-reactions { display: flex; gap: 0.35rem; }
    .reaction-chip { font-size: 0.78rem; background: var(--bg); border: 1px solid var(--border); border-radius: 99px; padding: 2px 8px; display: flex; align-items: center; gap: 3px; }
    .reaction-chip span { font-size: 0.65rem; color: var(--muted); font-weight: 600; }
    .pcb-comment-count { font-size: 0.75rem; color: var(--muted); background: var(--bg); border: 1px solid var(--border); border-radius: 99px; padding: 2px 10px; }
    .chevron { color: var(--muted); transition: transform 0.2s; }
    .project-comment-block.open .chevron { transform: rotate(180deg); }

    .pcb-body { display: none; border-top: 1.5px solid var(--border); padding: 1rem 1.25rem; }
    .project-comment-block.open .pcb-body { display: block; animation: fadeDown 0.2s ease; }

    /* Comment form inside project block */
    .inline-form { display: flex; gap: 0.65rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .inline-reaction-row { display: flex; gap: 0.4rem; margin-bottom: 0.75rem; }
    .inline-reaction-btn { background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; padding: 0.35rem 0.6rem; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; }
    .inline-reaction-btn:hover, .inline-reaction-btn.selected { border-color: var(--teal); background: var(--teal-dim); }
    .inline-input { flex: 1; min-width: 160px; border: 1.5px solid var(--border); border-radius: 8px; padding: 0.5rem 0.8rem; font-family: 'DM Sans', sans-serif; font-size: 0.86rem; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.2s; }
    .inline-input:focus { border-color: var(--teal); }
    .inline-name { width: 130px; flex-shrink: 0; }
    .btn-inline-submit { background: var(--teal); color: #fff; border: none; border-radius: 8px; padding: 0.5rem 1rem; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
    .btn-inline-submit:hover { background: var(--teal-dark); }

    .pcb-comments-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .pcb-comment { background: var(--bg); border-radius: 9px; padding: 0.7rem 0.9rem; }
    .pcb-comment-top { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 3px; }
    .pcb-comment-author { font-size: 0.8rem; font-weight: 700; }
    .pcb-comment-time { font-size: 0.68rem; color: var(--muted); margin-left: auto; }
    .pcb-comment-text { font-size: 0.84rem; line-height: 1.55; }
    .pcb-no-comments { font-size: 0.82rem; color: var(--muted); text-align: center; padding: 1rem 0; }

    /* EMPTY / LOADER */
    .empty-feed { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 0.88rem; }
    .loader { display: flex; justify-content: center; padding: 2rem; gap: 6px; }
    .loader span { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); animation: bounce 0.8s infinite alternate; }
    .loader span:nth-child(2) { animation-delay: 0.2s; }
    .loader span:nth-child(3) { animation-delay: 0.4s; }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 5px; }

    @keyframes fadeUp   { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounce   { from { transform: translateY(0); opacity: 0.5; } to { transform: translateY(-8px); opacity: 1; } }
    @keyframes spin     { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="logo">SK <span>Linaw</span></div>
  <div class="header-nav">
    <a class="nav-link" href="../Homepage/homepage.html">Home</a>
    <a class="nav-link" href="../Public-view/publicview.html">Projects</a>
    <a class="nav-link" href="../Budget/budget-public.html">Budget</a>
    <a class="btn-sk" href="../Log-in/login.html">SK Login</a>
  </div>
</header>

<div class="hero">
  <h1>Public <em>Feedback</em></h1>
  <p>Share your thoughts on SK programs and leave reactions on specific projects.</p>
</div>

<div class="main">

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('general', this)">💬 General Feedback</button>
    <button class="tab"        onclick="switchTab('projects', this)">📋 Project Comments</button>
  </div>

  <!-- ── GENERAL FEEDBACK PANEL ── -->
  <div class="panel active" id="panel-general">

    <!-- SUBMIT FORM -->
    <div class="feedback-form-card">
      <div class="form-title">Leave your feedback</div>
      <div class="form-subtitle">Your message will be visible to everyone. No account needed.</div>

      <div class="alert" id="generalAlert"></div>

      <!-- REACTION PICKER -->
      <div class="form-group">
        <label>Reaction</label>
        <div class="reaction-row" id="generalReactions">
          <button class="reaction-btn" data-reaction="like"    onclick="pickReaction('general', 'like', this)">👍</button>
          <button class="reaction-btn" data-reaction="dislike" onclick="pickReaction('general', 'dislike', this)">👎</button>
        </div>
      </div>

      <div class="form-group">
        <label>Your Message</label>
        <textarea id="generalMessage" rows="3" placeholder="Share your thoughts about the SK programs, budget usage, or anything you'd like the community to know…" maxlength="500" oninput="updateCharCount('generalMessage', 'generalCount')"></textarea>
        <div class="char-count"><span id="generalCount">0</span>/500</div>
      </div>

      <button class="btn-submit" id="generalSubmitBtn" onclick="submitGeneralFeedback()">Post Feedback</button>
    </div>

    <!-- FEED -->
    <div class="feed-header">
      <div class="feed-title">Community Feedback</div>
      <div class="feed-count" id="feedCount"></div>
    </div>
    <div id="generalFeed">
      <div class="loader"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- ── PROJECT COMMENTS PANEL ── -->
  <div class="panel" id="panel-projects">
    <div class="project-search-wrap">
      <input class="project-search" type="text" id="projectSearch" placeholder="Search projects…" oninput="filterProjects()"/>
    </div>
    <div id="projectCommentsList">
      <div class="loader"><span></span><span></span><span></span></div>
    </div>
  </div>

</div>

<script>
  const API      = 'http://localhost:8080/api';
  const BARANGAY = 'Lahug'; // ← update to match your client's barangay

  const REACTION_MAP = { like:'👍', dislike:'👎' };

  let selectedGeneralReaction = '';
  let allProjects = [];

  // ── TABS ──────────────────────────────────────────────────────────
  function switchTab(tab, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`panel-${tab}`).classList.add('active');
  }

  // ── REACTION PICKER ───────────────────────────────────────────────
  function pickReaction(scope, reaction, btn) {
    if (scope === 'general') {
      document.querySelectorAll('#generalReactions .reaction-btn').forEach(b => b.classList.remove('selected'));
      if (selectedGeneralReaction === reaction) {
        selectedGeneralReaction = '';
      } else {
        selectedGeneralReaction = reaction;
        btn.classList.add('selected');
      }
    }
  }

  function pickInlineReaction(projectId, reaction, btn) {
    const row = document.querySelectorAll(`[data-project-id="${projectId}"] .inline-reaction-btn`);
    row.forEach(b => b.classList.remove('selected'));
    btn.dataset.selected = btn.dataset.selected === reaction ? '' : reaction;
    if (btn.dataset.selected) btn.classList.add('selected');
  }

  // ── CHAR COUNTER ──────────────────────────────────────────────────
  function updateCharCount(inputId, countId) {
    const len = document.getElementById(inputId).value.length;
    document.getElementById(countId).textContent = len;
  }

  // ── GENERAL FEEDBACK ──────────────────────────────────────────────
  async function submitGeneralFeedback() {
    const message = document.getElementById('generalMessage').value.trim();
    const alertEl = document.getElementById('generalAlert');
    const btn     = document.getElementById('generalSubmitBtn');

    alertEl.className = 'alert';

    if (!message) {
      alertEl.textContent = 'Please write a message before submitting.';
      alertEl.className = 'alert error show';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Posting…';

    try {
      const res  = await fetch(`${API}/submitFeedback`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          barangay:   BARANGAY,
          authorName: 'Anonymous',
          message,
          reaction: selectedGeneralReaction
        })
      });
      const text = await res.text();

      if (text === 'SUCCESS') {
        alertEl.textContent = '✓ Your feedback has been posted!';
        alertEl.className = 'alert success show';
        document.getElementById('generalMessage').value = '';
        document.getElementById('generalCount').textContent = '0';
        selectedGeneralReaction = '';
        document.querySelectorAll('#generalReactions .reaction-btn').forEach(b => b.classList.remove('selected'));
        setTimeout(() => alertEl.classList.remove('show'), 3500);
        loadGeneralFeed();
      } else {
        alertEl.textContent = 'Could not post feedback: ' + text;
        alertEl.className = 'alert error show';
      }
    } catch (e) {
      alertEl.textContent = '⚠️ Could not connect to server.';
      alertEl.className = 'alert error show';
    }

    btn.disabled = false;
    btn.innerHTML = 'Post Feedback';
  }

  async function loadGeneralFeed() {
    const feedEl = document.getElementById('generalFeed');
    try {
      const res  = await fetch(`${API}/getFeedback?barangay=${encodeURIComponent(BARANGAY)}`);
      const data = await res.json();
      renderFeed(data);
    } catch (e) {
      // Demo data
      renderFeed([
        { id:1, authorName:'Maria S.',  message:'Great job on the basketball court renovation! The kids love it.',     reaction:'clap',  createdAt:'2025-03-15T10:30:00' },
        { id:2, authorName:'Anonymous', message:'Can we have more info on how the education budget was spent?',        reaction:'question', createdAt:'2025-03-12T08:15:00' },
        { id:3, authorName:'Pedro R.',  message:'The medical mission really helped our community. Thank you SK!',     reaction:'heart', createdAt:'2025-03-10T14:00:00' },
        { id:4, authorName:'Anonymous', message:'Suggestion: Can you organize more livelihood programs for parents?', reaction:'suggest', createdAt:'2025-03-08T09:45:00' },
      ]);
    }
  }

  function renderFeed(items) {
    const feedEl  = document.getElementById('generalFeed');
    const countEl = document.getElementById('feedCount');
    countEl.textContent = `${items.length} message${items.length !== 1 ? 's' : ''}`;

    if (!items.length) {
      feedEl.innerHTML = `<div class="empty-feed">No feedback yet. Be the first to leave a message!</div>`;
      return;
    }

    feedEl.innerHTML = items.map((item, i) => `
      <div class="comment-card" style="animation-delay:${i*0.05}s">
        <div class="comment-top">
          <div class="comment-avatar">${esc(item.authorName).charAt(0).toUpperCase()}</div>
          <div>
            <div class="comment-author">${esc(item.authorName)}</div>
          </div>
          ${item.reaction ? `<span class="comment-reaction-badge">${REACTION_MAP[item.reaction] || ''}</span>` : ''}
          <div class="comment-time">${timeAgo(item.createdAt)}</div>
        </div>
        <div class="comment-body">${esc(item.message)}</div>
      </div>
    `).join('');
  }

  // ── PROJECT COMMENTS ──────────────────────────────────────────────
  async function loadProjects() {
    try {
      const cRes = await fetch(`${API}/getCommittees?barangay=${encodeURIComponent(BARANGAY)}`);
      const coms = await cRes.json();
      allProjects = [];
      for (const c of coms) {
        const pRes = await fetch(`${API}/getProjects?barangay=${encodeURIComponent(BARANGAY)}&committeeName=${encodeURIComponent(c.name)}`);
        const ps   = await pRes.json();
        if (Array.isArray(ps)) ps.filter(p => p.status === 'APPROVED').forEach(p => allProjects.push({ ...p, committeeName: c.name }));
      }
      renderProjectList(allProjects);
    } catch (e) {
      // Demo projects
      allProjects = [
        { id:1, projectName:'Basketball Court Renovation', committeeName:'Sports',    councilorName:'Juan Dela Cruz', totalCost:85000 },
        { id:2, projectName:'School Supplies Drive',       committeeName:'Education', councilorName:'Maria Santos',   totalCost:45000 },
        { id:3, projectName:'Medical Mission',             committeeName:'Health',    councilorName:'Ana Gomez',      totalCost:60000 },
      ];
      renderProjectList(allProjects);
    }
  }

  function filterProjects() {
    const q = document.getElementById('projectSearch').value.toLowerCase();
    const filtered = allProjects.filter(p =>
      p.projectName.toLowerCase().includes(q) ||
      p.committeeName.toLowerCase().includes(q)
    );
    renderProjectList(filtered);
  }

  function renderProjectList(projects) {
    const el = document.getElementById('projectCommentsList');
    if (!projects.length) {
      el.innerHTML = `<div class="empty-feed">No projects found.</div>`;
      return;
    }
    el.innerHTML = projects.map(p => `
      <div class="project-comment-block" id="pcb-${p.id}" data-project-id="${p.id}">
        <div class="pcb-header" onclick="toggleProject(${p.id})">
          <div>
            <div class="pcb-name">${esc(p.projectName)}</div>
            <div class="pcb-meta">📁 ${esc(p.committeeName)} · 👤 ${esc(p.councilorName)} · ₱${(p.totalCost||0).toLocaleString('en-PH')}</div>
          </div>
          <div class="pcb-right">
            <div class="pcb-reactions" id="reactions-${p.id}"></div>
            <div class="pcb-comment-count" id="ccount-${p.id}">💬 —</div>
            <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
        <div class="pcb-body" id="pcbbody-${p.id}">
          <!-- Reaction + comment form -->
          <div style="margin-bottom:1rem">
            <div style="font-size:0.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px">React & Comment</div>
            <div class="inline-reaction-row" id="inlineReactions-${p.id}">
              <button class="inline-reaction-btn" data-selected="" onclick="pickInlineReaction(${p.id}, 'like', this)">👍</button>
              <button class="inline-reaction-btn" data-selected="" onclick="pickInlineReaction(${p.id}, 'dislike', this)">👎</button>
            </div>
            <div class="inline-form">
              <input class="inline-input" type="text" id="pmsg-${p.id}" placeholder="Write a comment…" maxlength="500"/>
              <button class="btn-inline-submit" onclick="submitProjectComment(${p.id})">Post</button>
            </div>
            <div class="alert" id="palert-${p.id}" style="margin-bottom:0.5rem"></div>
          </div>
          <!-- Comments list -->
          <div class="pcb-comments-list" id="pcomments-${p.id}">
            <div class="pcb-no-comments">Loading comments…</div>
          </div>
        </div>
      </div>
    `).join('');

    // Load reaction counts for all projects
    projects.forEach(p => loadProjectReactions(p.id));
  }

  async function toggleProject(projectId) {
    const block = document.getElementById(`pcb-${projectId}`);
    const isOpen = block.classList.contains('open');
    block.classList.toggle('open');
    if (!isOpen) {
      loadProjectComments(projectId);
    }
  }

  async function loadProjectReactions(projectId) {
    try {
      const res  = await fetch(`${API}/getProjectReactions?projectId=${projectId}`);
      const data = await res.json();
      const el   = document.getElementById(`reactions-${projectId}`);
      if (el) {
        el.innerHTML = Object.entries(data)
          .filter(([, count]) => count > 0)
          .map(([r, count]) => `<div class="reaction-chip">${REACTION_MAP[r]||r} <span>${count}</span></div>`)
          .join('');
      }
    } catch (e) {}
  }

  async function loadProjectComments(projectId) {
    const listEl = document.getElementById(`pcomments-${projectId}`);
    const countEl = document.getElementById(`ccount-${projectId}`);
    try {
      const res  = await fetch(`${API}/getProjectComments?projectId=${projectId}`);
      const data = await res.json();
      if (countEl) countEl.textContent = `💬 ${data.length}`;
      if (!data.length) {
        listEl.innerHTML = `<div class="pcb-no-comments">No comments yet. Be the first!</div>`;
        return;
      }
      listEl.innerHTML = data.map(c => `
        <div class="pcb-comment">
          <div class="pcb-comment-top">
            ${c.reaction ? `<span>${REACTION_MAP[c.reaction]||''}</span>` : ''}
            <span class="pcb-comment-author">${esc(c.authorName)}</span>
            <span class="pcb-comment-time">${timeAgo(c.createdAt)}</span>
          </div>
          <div class="pcb-comment-text">${esc(c.message)}</div>
        </div>
      `).join('');
    } catch (e) {
      // Demo comments
      if (countEl) countEl.textContent = '💬 2';
      listEl.innerHTML = `
        <div class="pcb-comment">
          <div class="pcb-comment-top"><span>👍</span><span class="pcb-comment-author">Juan M.</span><span class="pcb-comment-time">2 days ago</span></div>
          <div class="pcb-comment-text">This was badly needed in our community, thank you!</div>
        </div>
        <div class="pcb-comment">
          <div class="pcb-comment-top"><span class="pcb-comment-author">Anonymous</span><span class="pcb-comment-time">1 week ago</span></div>
          <div class="pcb-comment-text">Can we see the receipts for this project?</div>
        </div>`;
    }
  }

  async function submitProjectComment(projectId) {
    const message = document.getElementById(`pmsg-${projectId}`).value.trim();
    const alertEl = document.getElementById(`palert-${projectId}`);
    const reactionBtn = document.querySelector(`#inlineReactions-${projectId} .inline-reaction-btn.selected`);
    const reaction = reactionBtn?.dataset.selected || '';

    alertEl.className = 'alert';
    if (!message && !reaction) {
      alertEl.textContent = 'Please write a comment or pick a reaction.';
      alertEl.className = 'alert error show';
      return;
    }

    try {
      const res  = await fetch(`${API}/submitProjectComment`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          projectId,
          barangay:   BARANGAY,
          authorName: 'Anonymous',
          message:    message || '(reacted)',
          reaction
        })
      });
      const text = await res.text();
      if (text === 'SUCCESS') {
        document.getElementById(`pmsg-${projectId}`).value = '';
        document.querySelectorAll(`#inlineReactions-${projectId} .inline-reaction-btn`).forEach(b => {
          b.classList.remove('selected');
          b.dataset.selected = '';
        });
        alertEl.className = 'alert';
        loadProjectComments(projectId);
        loadProjectReactions(projectId);
      } else {
        alertEl.textContent = 'Error: ' + text;
        alertEl.className = 'alert error show';
      }
    } catch (e) {
      alertEl.textContent = '⚠️ Could not connect to server.';
      alertEl.className = 'alert error show';
    }
  }

  // ── HELPERS ───────────────────────────────────────────────────────
  function timeAgo(dateStr) {
    if (!dateStr) return '—';
    try {
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1)   return 'just now';
      if (mins < 60)  return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24)   return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      if (days < 7)   return `${days}d ago`;
      return new Date(dateStr).toLocaleDateString('en-PH', { month:'short', day:'numeric' });
    } catch { return '—'; }
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── INIT ─────────────────────────────────────────────────────────
  loadGeneralFeed();
  loadProjects();
</script>
</body>
</html>
