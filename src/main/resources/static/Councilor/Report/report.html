<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SK Linaw – Barangay Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --teal:      #0BBFB5;
      --teal-dark: #089991;
      --teal-dim:  rgba(11,191,181,0.1);
      --bg:        #0D1F1E;
      --surface:   #142322;
      --surface2:  #1C302E;
      --border:    rgba(11,191,181,0.18);
      --text:      #E8F5F4;
      --muted:     #6AACAA;
      --warning:   #F59E0B;
      --error:     #EF4444;
      --success:   #10B981;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

    .sidebar { width: 230px; min-width: 230px; background: var(--surface); border-right: 1px solid var(--border); padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 0.3rem; position: sticky; top: 0; height: 100vh; }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.25rem; color: var(--teal); padding: 0.5rem 0.75rem 1.25rem; border-bottom: 1px solid var(--border); margin-bottom: 0.5rem; }
    .logo span { color: var(--text); }
    .nav-section { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); padding: 0.6rem 0.75rem 0.3rem; }
    .nav-item { display: flex; align-items: center; gap: 0.65rem; padding: 0.6rem 0.75rem; border-radius: 9px; font-size: 0.86rem; font-weight: 500; color: var(--muted); text-decoration: none; transition: background 0.2s, color 0.2s; }
    .nav-item:hover, .nav-item.active { background: var(--teal-dim); color: var(--teal); }
    .sidebar-footer { margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border); }
    .user-chip { display: flex; align-items: center; gap: 0.65rem; padding: 0.6rem 0.75rem; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--teal-dim); border: 1.5px solid var(--teal); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.85rem; color: var(--teal); flex-shrink: 0; }
    .user-name { font-size: 0.84rem; font-weight: 600; }
    .user-role { font-size: 0.7rem; color: var(--teal); font-weight: 600; }
    .btn-logout { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem; color: var(--muted); font-size: 0.82rem; cursor: pointer; border: none; background: none; border-radius: 8px; width: 100%; transition: color 0.2s; }
    .btn-logout:hover { color: var(--error); }

    .main { flex: 1; padding: 2rem 2.5rem; overflow-y: auto; }
    .page-title { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 0.3rem; }
    .page-sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 2rem; }

    .generator-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 2rem; }
    .gen-title { font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 1.1rem; }
    .gen-row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end; }
    .gen-group { flex: 1; min-width: 140px; }
    .gen-group label { display: block; font-size: 0.73rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
    .gen-group select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; padding: 0.55rem 0.8rem; outline: none; transition: border-color 0.2s; }
    .gen-group select:focus { border-color: var(--teal); }
    .gen-group select option { background: var(--surface2); }
    .btn-generate { background: var(--teal); color: #fff; border: none; border-radius: 8px; padding: 0.58rem 1.4rem; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
    .btn-generate:hover { background: var(--teal-dark); }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

    .report-actions { display: flex; gap: 0.75rem; margin-bottom: 1.25rem; }
    .btn-print { background: var(--teal); color: #fff; border: none; border-radius: 8px; padding: 0.55rem 1.3rem; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.86rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; transition: background 0.2s; }
    .btn-print:hover { background: var(--teal-dark); }
    .btn-print-outline { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 0.55rem 1.3rem; font-family: 'DM Sans', sans-serif; font-size: 0.86rem; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .btn-print-outline:hover { border-color: var(--teal); color: var(--teal); }

    .loader { display: flex; justify-content: center; padding: 3rem; gap: 6px; }
    .loader span { width: 9px; height: 9px; border-radius: 50%; background: var(--teal); animation: bounce 0.8s infinite alternate; }
    .loader span:nth-child(2) { animation-delay: 0.2s; }
    .loader span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounce { from { transform: translateY(0); opacity: 0.5; } to { transform: translateY(-9px); opacity: 1; } }

    @media (max-width: 650px) { .sidebar { display: none; } .main { padding: 1.25rem; } }

    
    #reportDoc {
      display: none;
      background: #fff;
      color: #111;
      border-radius: 14px;
      overflow: hidden;
      animation: fadeUp 0.4s ease;
      font-family: 'DM Sans', sans-serif;
    }

    .report-cover {
      background: #0D2B2A;
      color: #fff;
      padding: 3rem 3rem 2.5rem;
      position: relative;
      overflow: hidden;
    }
    .report-cover::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 80% 50%, rgba(11,191,181,0.18) 0%, transparent 60%);
      pointer-events: none;
    }
    .report-cover-badge {
      display: inline-block;
      border: 1px solid rgba(11,191,181,0.4);
      color: #0BBFB5;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 3px 12px;
      border-radius: 99px;
      margin-bottom: 1rem;
      position: relative;
    }
    .report-cover h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 0.5rem;
      position: relative;
    }
    .report-cover h1 span { color: #0BBFB5; }
    .report-cover-meta {
      font-size: 0.84rem;
      color: #7AADAB;
      position: relative;
      margin-top: 0.4rem;
    }
    .report-cover-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 2rem;
      position: relative;
    }
    .report-cover-barangay {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
    }
    .report-cover-generated {
      font-size: 0.75rem;
      color: #7AADAB;
      text-align: right;
    }

    .report-body { padding: 2.5rem 3rem; }

    .report-section { margin-bottom: 2.5rem; }
    .report-section-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #5A8A88;
      border-bottom: 2px solid #D2ECEB;
      padding-bottom: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .report-stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .report-stat {
      background: #F0F7F7;
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
    }
    .report-stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: #0BBFB5;
    }
    .report-stat-lbl { font-size: 0.72rem; color: #5A8A88; margin-top: 2px; }

    .report-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    .report-table th { text-align: left; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #5A8A88; padding: 0.6rem 0.85rem; background: #F0F7F7; border-bottom: 2px solid #D2ECEB; }
    .report-table td { padding: 0.7rem 0.85rem; border-bottom: 1px solid #E8F5F4; vertical-align: middle; }
    .report-table tr:last-child td { border-bottom: none; }
    .report-table tr:hover td { background: #F8FDFD; }
    .td-name { font-weight: 600; }
    .td-cost { font-family: 'Syne', sans-serif; font-weight: 700; color: #0BBFB5; }
    .committee-badge { display: inline-block; font-size: 0.68rem; font-weight: 700; padding: 2px 8px; border-radius: 99px; background: rgba(11,191,181,0.1); color: #0BBFB5; }

    .budget-bar-wrap { margin-bottom: 1rem; }
    .budget-bar-header { display: flex; justify-content: space-between; font-size: 0.82rem; margin-bottom: 4px; }
    .budget-bar-name { font-weight: 600; }
    .budget-bar-amounts { color: #5A8A88; font-size: 0.76rem; }
    .budget-bar-track { height: 8px; background: #E8F5F4; border-radius: 99px; overflow: hidden; }
    .budget-bar-fill { height: 100%; border-radius: 99px; }
    .budget-bar-footer { display: flex; justify-content: space-between; font-size: 0.72rem; color: #5A8A88; margin-top: 3px; }

    .feedback-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .fb-box { background: #F0F7F7; border-radius: 10px; padding: 1rem 1.25rem; }
    .fb-box-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; color: #5A8A88; letter-spacing: 0.4px; margin-bottom: 0.6rem; }
    .fb-count { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; }
    .fb-count.positive { color: #10B981; }
    .fb-count.negative { color: #EF4444; }
    .fb-sub { font-size: 0.75rem; color: #5A8A88; margin-top: 2px; }

    .report-signature { margin-top: 3rem; padding-top: 2rem; border-top: 2px solid #D2ECEB; display: flex; justify-content: flex-end; }
    .signature-block { text-align: center; }
    .signature-line { border-bottom: 1.5px solid #0D2B2A; width: 200px; margin-bottom: 6px; }
    .signature-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; }
    .signature-role { font-size: 0.75rem; color: #5A8A88; }

    .report-empty { text-align: center; color: #5A8A88; padding: 2rem; font-size: 0.88rem; }

    
    @media print {
      body { background: #fff !important; display: block !important; }
      .sidebar, .main > *:not(#reportDoc), .report-actions { display: none !important; }
      .main { padding: 0 !important; }
      #reportDoc { display: block !important; border-radius: 0 !important; box-shadow: none !important; }
      .report-cover { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .report-stat { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .budget-bar-fill { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .report-section { page-break-inside: avoid; }
      .report-table { page-break-inside: auto; }
      .report-table tr { page-break-inside: avoid; }
    }
  </style>
</head>
<body>

<nav class="sidebar">
  <div class="logo">SK <span>Linaw</span></div>
  <div class="nav-section">Main</div>
  <a class="nav-item" href="../Dashboard/dashboard.html">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Dashboard
  </a>
  <a class="nav-item" href="../Project/projects.html">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
    Projects
  </a>
  <div class="nav-section">Reports</div>
  <a class="nav-item active" href="report.html">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>
    Generate Report
  </a>
  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="avatar" id="avatarEl">?</div>
      <div>
        <div class="user-name" id="nameEl">Loading…</div>
        <div class="user-role">Chairman</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      Log Out
    </button>
  </div>
</nav>

<div class="main">
  <div class="page-title">Barangay SK Report</div>
  <div class="page-sub">Generate end-of-month or end-of-year reports for all committees.</div>

  <div class="generator-card">
    <div class="gen-title">Report Settings</div>
    <div class="gen-row">
      <div class="gen-group">
        <label>Report Type</label>
        <select id="reportType" onchange="onTypeChange()">
          <option value="monthly">End of Month</option>
          <option value="yearly">End of Year</option>
        </select>
      </div>
      <div class="gen-group" id="monthGroup">
        <label>Month</label>
        <select id="reportMonth">
          <option value="1">January</option>
          <option value="2">February</option>
          <option value="3">March</option>
          <option value="4">April</option>
          <option value="5">May</option>
          <option value="6">June</option>
          <option value="7">July</option>
          <option value="8">August</option>
          <option value="9">September</option>
          <option value="10">October</option>
          <option value="11">November</option>
          <option value="12">December</option>
        </select>
      </div>
      <div class="gen-group">
        <label>Year</label>
        <select id="reportYear"></select>
      </div>
      <button class="btn-generate" onclick="generateReport()">Generate Report</button>
    </div>
  </div>

  <div id="reportLoading" style="display:none">
    <div class="loader"><span></span><span></span><span></span></div>
  </div>

  <div class="report-actions" id="reportActions" style="display:none">
    <button class="btn-print" onclick="window.print()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Print / Download PDF
    </button>
    <button class="btn-print-outline" onclick="generateReport()">↺ Regenerate</button>
  </div>

  <div id="reportDoc"></div>
</div>

<script>
  const API      = 'http://localhost:8080/api';
  const BARANGAY = 'Lahug';

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const COLORS  = ['#0BBFB5','#F59E0B','#6366F1','#10B981','#EC4899','#3B82F6','#F97316','#8B5CF6'];

  const session = {
    name:     localStorage.getItem('sk_name')     || 'Chairman',
    barangay: localStorage.getItem('sk_barangay') || BARANGAY
  };
  document.getElementById('nameEl').textContent   = session.name;
  document.getElementById('avatarEl').textContent = session.name.charAt(0).toUpperCase();

  const yearSel = document.getElementById('reportYear');
  const now     = new Date();
  for (let y = now.getFullYear(); y >= now.getFullYear() - 5; y--) {
    const o = document.createElement('option');
    o.value = o.textContent = y;
    yearSel.appendChild(o);
  }
  document.getElementById('reportMonth').value = now.getMonth() + 1;

  function onTypeChange() {
    const isMonthly = document.getElementById('reportType').value === 'monthly';
    document.getElementById('monthGroup').style.display = isMonthly ? '' : 'none';
  }

  async function generateReport() {
    const type  = document.getElementById('reportType').value;
    const month = parseInt(document.getElementById('reportMonth').value);
    const year  = parseInt(document.getElementById('reportYear').value);

    document.getElementById('reportDoc').style.display     = 'none';
    document.getElementById('reportActions').style.display  = 'none';
    document.getElementById('reportLoading').style.display  = 'flex';

    try {
      const [budgetData, committees, feedbackData] = await Promise.all([
        fetch(`${API}/getBudget?barangay=${encodeURIComponent(session.barangay)}`).then(r => r.json()).catch(() => ({ totalBudget: 0, committees: [] })),
        fetchAllProjects(type, month, year),
        fetch(`${API}/getFeedback?barangay=${encodeURIComponent(session.barangay)}`).then(r => r.json()).catch(() => [])
      ]);

      renderReport({ type, month, year, budgetData, projects: committees.projects, committeeList: committees.committeeList, feedbackData });
    } catch (e) {
      renderReport({
        type, month, year,
        budgetData: {
          totalBudget: 500000,
          committees: [
            { committeeName:'Sports',      allocated:120000, spent:85000  },
            { committeeName:'Education',   allocated:150000, spent:110000 },
            { committeeName:'Environment', allocated:80000,  spent:45000  },
            { committeeName:'Health',      allocated:100000, spent:60000  },
          ]
        },
        projects: [
          { id:1, projectName:'Basketball Court Renovation', committeeName:'Sports',    councilorName:'Juan Dela Cruz', totalCost:85000,  createdAt:'2025-03-01' },
          { id:2, projectName:'School Supplies Drive',       committeeName:'Education', councilorName:'Maria Santos',   totalCost:45000,  createdAt:'2025-03-05' },
          { id:3, projectName:'Medical Mission',             committeeName:'Health',    councilorName:'Ana Gomez',      totalCost:60000,  createdAt:'2025-03-14' },
        ],
        committeeList: ['Sports','Education','Environment','Health'],
        feedbackData: [
          { reaction:'like',    message:'Great job!',              createdAt:'2025-03-10' },
          { reaction:'like',    message:'Keep it up!',             createdAt:'2025-03-12' },
          { reaction:'dislike', message:'Need more transparency.',  createdAt:'2025-03-15' },
        ]
      });
    }

    document.getElementById('reportLoading').style.display  = 'none';
    document.getElementById('reportDoc').style.display      = 'block';
    document.getElementById('reportActions').style.display  = 'flex';
  }

  async function fetchAllProjects(type, month, year) {
    let allProjects = [];
    let committeeList = [];
    try {
      const cRes = await fetch(`${API}/getCommittees?barangay=${encodeURIComponent(session.barangay)}`);
      const coms = await cRes.json();
      committeeList = coms.map(c => c.name);

      for (const c of coms) {
        const pRes = await fetch(`${API}/getProjects?barangay=${encodeURIComponent(session.barangay)}&committeeName=${encodeURIComponent(c.name)}`);
        const ps   = await pRes.json();
        if (Array.isArray(ps)) {
          ps.filter(p => {
            if (p.status !== 'APPROVED') return false;
            const d = new Date(p.createdAt);
            if (type === 'yearly') return d.getFullYear() === year;
            return d.getFullYear() === year && d.getMonth() + 1 === month;
          }).forEach(p => allProjects.push({ ...p, committeeName: c.name }));
        }
      }
    } catch (e) {}
    return { projects: allProjects, committeeList };
  }

  function renderReport({ type, month, year, budgetData, projects, committeeList, feedbackData }) {
    const isMonthly   = type === 'monthly';
    const periodLabel = isMonthly ? `${MONTHS[month-1]} ${year}` : `Year ${year}`;
    const reportTitle = isMonthly ? 'End of Month Report' : 'End of Year Report';
    const genDate     = new Date().toLocaleDateString('en-PH', { year:'numeric', month:'long', day:'numeric' });

    const totalSpent    = (budgetData.committees||[]).reduce((s,c) => s + (c.spent||0), 0);
    const totalBudget   = budgetData.totalBudget || 0;
    const positiveFb    = (feedbackData||[]).filter(f => f.reaction === 'like').length;
    const negativeFb    = (feedbackData||[]).filter(f => f.reaction === 'dislike').length;
    const totalFb       = (feedbackData||[]).length;

    const doc = document.getElementById('reportDoc');
    doc.innerHTML = `
      <div class="report-cover">
        <div class="report-cover-badge">${reportTitle}</div>
        <h1>SK Linaw <span>${periodLabel}</span><br>Barangay Report</h1>
        <div class="report-cover-meta">Sangguniang Kabataan — Official Accountability Report</div>
        <div class="report-cover-footer">
          <div class="report-cover-barangay">Barangay ${esc(session.barangay)}</div>
          <div class="report-cover-generated">Generated: ${genDate}<br>Prepared by: ${esc(session.name)}, SK Chairman</div>
        </div>
      </div>

      <div class="report-body">

        
        <div class="report-section">
          <div class="report-section-title">Overview</div>
          <div class="report-stat-grid">
            <div class="report-stat">
              <div class="report-stat-val">${projects.length}</div>
              <div class="report-stat-lbl">Projects Completed</div>
            </div>
            <div class="report-stat">
              <div class="report-stat-val">₱${totalSpent.toLocaleString('en-PH')}</div>
              <div class="report-stat-lbl">Total Spent</div>
            </div>
            <div class="report-stat">
              <div class="report-stat-val">₱${Math.max(0, totalBudget - totalSpent).toLocaleString('en-PH')}</div>
              <div class="report-stat-lbl">Remaining Budget</div>
            </div>
            <div class="report-stat">
              <div class="report-stat-val">${totalFb}</div>
              <div class="report-stat-lbl">Public Feedback</div>
            </div>
          </div>
        </div>

        
        <div class="report-section">
          <div class="report-section-title">Projects Completed — ${periodLabel}</div>
          ${projects.length === 0
            ? `<div class="report-empty">No approved projects found for this period.</div>`
            : `<table class="report-table">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Project Name</th>
                    <th>Committee</th>
                    <th>Submitted By</th>
                    <th>Date</th>
                    <th style="text-align:right">Cost</th>
                  </tr>
                </thead>
                <tbody>
                  ${projects.map((p, i) => `
                    <tr>
                      <td style="color:#5A8A88">${i+1}</td>
                      <td class="td-name">${esc(p.projectName)}</td>
                      <td><span class="committee-badge">${esc(p.committeeName)}</span></td>
                      <td style="color:#5A8A88">${esc(p.councilorName)}</td>
                      <td style="color:#5A8A88">${fmtDate(p.createdAt)}</td>
                      <td class="td-cost" style="text-align:right">₱${(p.totalCost||0).toLocaleString('en-PH')}</td>
                    </tr>`).join('')}
                  <tr style="font-weight:700;background:#F0F7F7">
                    <td colspan="5" style="text-align:right;font-size:0.82rem;color:#5A8A88">TOTAL</td>
                    <td class="td-cost" style="text-align:right">₱${projects.reduce((s,p)=>s+(p.totalCost||0),0).toLocaleString('en-PH')}</td>
                  </tr>
                </tbody>
              </table>`}
        </div>

        
        <div class="report-section">
          <div class="report-section-title">Budget — Spent vs Allocated per Committee</div>
          ${(budgetData.committees||[]).length === 0
            ? `<div class="report-empty">No budget data available.</div>`
            : (budgetData.committees||[]).map((c, i) => {
                const pct  = c.allocated > 0 ? Math.min((c.spent/c.allocated)*100, 100) : 0;
                const over = c.spent > c.allocated;
                const color = over ? '#EF4444' : COLORS[i % COLORS.length];
                return `
                  <div class="budget-bar-wrap">
                    <div class="budget-bar-header">
                      <span class="budget-bar-name">${esc(c.committeeName)}</span>
                      <span class="budget-bar-amounts">₱${(c.spent||0).toLocaleString('en-PH')} / ₱${(c.allocated||0).toLocaleString('en-PH')}</span>
                    </div>
                    <div class="budget-bar-track">
                      <div class="budget-bar-fill" style="width:${pct}%;background:${color}"></div>
                    </div>
                    <div class="budget-bar-footer">
                      <span>${pct.toFixed(1)}% used</span>
                      <span style="color:${over?'#EF4444':'#5A8A88'}">${over ? 'EXCEEDED by ₱'+Math.abs(c.allocated-c.spent).toLocaleString('en-PH') : 'Remaining: ₱'+Math.max(0,c.allocated-c.spent).toLocaleString('en-PH')}</span>
                    </div>
                  </div>`;
              }).join('')}
          <div style="margin-top:1rem;padding:0.85rem 1rem;background:#F0F7F7;border-radius:8px;display:flex;justify-content:space-between;font-size:0.84rem">
            <span>Total SK Budget: <strong>₱${totalBudget.toLocaleString('en-PH')}</strong></span>
            <span>Total Spent: <strong>₱${totalSpent.toLocaleString('en-PH')}</strong></span>
            <span>Remaining: <strong>₱${Math.max(0,totalBudget-totalSpent).toLocaleString('en-PH')}</strong></span>
          </div>
        </div>

        
        <div class="report-section">
          <div class="report-section-title">Public Feedback Summary</div>
          <div class="feedback-summary">
            <div class="fb-box">
              <div class="fb-box-title">👍 Positive Feedback</div>
              <div class="fb-count positive">${positiveFb}</div>
              <div class="fb-sub">${totalFb > 0 ? ((positiveFb/totalFb)*100).toFixed(0) : 0}% of total responses</div>
            </div>
            <div class="fb-box">
              <div class="fb-box-title">👎 Negative Feedback</div>
              <div class="fb-count negative">${negativeFb}</div>
              <div class="fb-sub">${totalFb > 0 ? ((negativeFb/totalFb)*100).toFixed(0) : 0}% of total responses</div>
            </div>
          </div>
          ${totalFb === 0 ? `<div class="report-empty" style="margin-top:1rem">No public feedback recorded for this period.</div>` : ''}
        </div>

        
        <div class="report-signature">
          <div class="signature-block">
            <div class="signature-line"></div>
            <div class="signature-name">${esc(session.name)}</div>
            <div class="signature-role">SK Chairman, Barangay ${esc(session.barangay)}</div>
          </div>
        </div>

      </div>
    `;
  }

  function fmtDate(s) {
    if (!s) return '—';
    try { return new Date(s).toLocaleDateString('en-PH', { year:'numeric', month:'short', day:'numeric' }); }
    catch { return s; }
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function logout() {
    localStorage.removeItem('sk_name');
    localStorage.removeItem('sk_barangay');
    localStorage.removeItem('sk_role');
    window.location.href = '../Log-in/login.html';
  }
</script>
</body>
</html>
