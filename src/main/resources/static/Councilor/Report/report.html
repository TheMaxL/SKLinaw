<html lang="en">
<head>

  <link rel="stylesheet" href="report.css"/>
</head>

<body>

<nav class="sidebar">
  <div class="logo">SK <span>Linaw</span></div>
  
  <div class="nav-section">Main</div>
  <a class="nav-item" href="../Dashboard/Dashboard">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
      <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
    </svg>
    Dashboard
  </a>
  
  <a class="nav-item" href="../Project/Projects">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/>
    </svg>
    Projects
  </a>
  
  <a class="nav-item" href="../Committee/Committee">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
    </svg>
    Committees
  </a>
  
  <div class="nav-section">Finance</div>
  <a class="nav-item" href="../Budget/Budget">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
    </svg>
    Budget
  </a>
  
  <a class="nav-item" href="../Expenses/Expenses">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    Expenses
  </a>
  
  <!-- NEW: Reports Section -->
  <div class="nav-section">Reports</div>
  <a class="nav-item active" href="../Report/Report">

      <path d="M12 2v2M8 2v2M16 2v2"/>

  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="avatar" id="avatarEl">?</div>
      <div>
        <div class="user-name" id="nameEl">Loading…</div>
        <div class="user-role" id="roleEl">Councilor</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
      </svg>
      Log Out
    </button>
  </div>
</nav>

<div class="main">

  <div class="page-title">Barangay SK Report</div>

  <div class="page-sub">
    Generate end-of-month or end-of-year reports for all committees.
  </div>

  <div class="generator-card">

    <div class="gen-title">Report Settings</div>

    <div class="gen-row">

      <div class="gen-group">
        <label>Report Type</label>

        <select id="reportType" onchange="onTypeChange()">
          <option value="monthly">End of Month</option>
          <option value="yearly">End of Year</option>
        </select>
      </div>

      <div class="gen-group" id="monthGroup">
        <label>Month</label>

        <select id="reportMonth">
          <option value="1">January</option>
          <option value="2">February</option>
          <option value="3">March</option>
          <option value="4">April</option>
          <option value="5">May</option>
          <option value="6">June</option>
          <option value="7">July</option>
          <option value="8">August</option>
          <option value="9">September</option>
          <option value="10">October</option>
          <option value="11">November</option>
          <option value="12">December</option>
        </select>
      </div>

      <div class="gen-group">
        <label>Year</label>
        <select id="reportYear"></select>
      </div>

      <button class="btn-generate" onclick="generateReport()">
        Generate Report
      </button>

    </div>
  </div>

  <div id="reportLoading" style="display:none">
    <div class="loader">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <div class="report-actions" id="reportActions" style="display:none">

    <button class="btn-print" onclick="window.print()">
      Print / Download PDF
    </button>

    <button class="btn-print-outline" onclick="generateReport()">
      ↺ Regenerate
    </button>

  </div>

  <div id="reportDoc"></div>

</div>

<script src="report.js"></script>

</body>
</html>
