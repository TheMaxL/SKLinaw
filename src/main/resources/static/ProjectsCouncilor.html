<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SK Linaw – Committee Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --teal:       #0BBFB5;
      --teal-dark:  #089991;
      --teal-dim:   rgba(11,191,181,0.1);
      --bg:         #0D1F1E;
      --surface:    #142322;
      --surface2:   #1C302E;
      --border:     rgba(11,191,181,0.18);
      --text:       #E8F5F4;
      --muted:      #6AACAA;
      --pending:    #F59E0B;
      --approved:   #10B981;
      --rejected:   #EF4444;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      color: var(--teal);
      padding: 0.5rem 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.5rem;
    }
    .logo span { color: var(--text); }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.6rem 0.75rem;
      border-radius: 9px;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      text-decoration: none;
    }
    .nav-item:hover, .nav-item.active {
      background: var(--teal-dim);
      color: var(--teal);
    }
    .nav-item svg { flex-shrink: 0; }
    .sidebar-footer {
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .user-chip {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.75rem;
    }
    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--teal-dim);
      border: 1.5px solid var(--teal);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--teal);
      flex-shrink: 0;
    }
    .user-info { min-width: 0; }
    .user-name {
      font-size: 0.82rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-role {
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      max-width: 900px;
    }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 0.25rem;
    }
    .page-subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.75rem; }

    /* ── BUDGET OVERVIEW ── */
    .budget-section { margin-bottom: 2rem; }
    .section-heading {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 0.85rem;
    }
    .budget-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      animation: fadeUp 0.4s ease both;
    }
    .budget-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }
    .budget-total-label { font-size: 0.8rem; color: var(--muted); }
    .budget-total-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--teal);
    }
    .budget-meta { font-size: 0.78rem; color: var(--muted); text-align: right; }

    .committee-rows { display: flex; flex-direction: column; gap: 0.65rem; }
    .committee-row { }
    .committee-row-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.83rem;
      margin-bottom: 4px;
    }
    .committee-row-name { font-weight: 600; }
    .committee-row-amounts { color: var(--muted); font-size: 0.78rem; }
    .progress-track {
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--teal);
      border-radius: 99px;
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
    }
    .progress-fill.over { background: var(--rejected); }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .filter-bar select,
    .filter-bar input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      padding: 0.48rem 0.85rem;
      outline: none;
      transition: border 0.2s;
    }
    .filter-bar select:focus,
    .filter-bar input:focus { border-color: var(--teal); }
    .filter-bar input { flex: 1; min-width: 160px; }
    .btn-add {
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.48rem 1.2rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      margin-left: auto;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-add:hover { background: var(--teal-dark); }

    /* ── PROJECT TABLE ── */
    .project-table {
      width: 100%;
      border-collapse: collapse;
    }
    .project-table th {
      text-align: left;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      padding: 0.5rem 0.85rem;
      border-bottom: 1px solid var(--border);
    }
    .project-table td {
      padding: 0.85rem;
      font-size: 0.86rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .project-table tr:last-child td { border-bottom: none; }
    .project-table tbody tr {
      transition: background 0.15s;
      animation: fadeUp 0.3s ease both;
    }
    .project-table tbody tr:hover { background: var(--surface2); }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .project-name-cell { font-weight: 600; }
    .project-purpose-cell { color: var(--muted); font-size: 0.8rem; max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cost-cell {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      color: var(--teal);
      white-space: nowrap;
    }

    .status-pill {
      font-size: 0.66rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 9px;
      border-radius: 99px;
      white-space: nowrap;
    }
    .status-APPROVED { background: rgba(16,185,129,0.15); color: var(--approved); }
    .status-PENDING  { background: rgba(245,158,11,0.15);  color: var(--pending); }
    .status-REJECTED { background: rgba(239,68,68,0.15);   color: var(--rejected); }

    .action-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.75rem;
      padding: 3px 8px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .action-btn:hover { color: var(--teal); border-color: var(--teal); }

    /* ── EMPTY / LOADING ── */
    .empty-row td {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 0.88rem;
    }
    .loader-row td {
      text-align: center;
      padding: 2.5rem;
    }
    .loader {
      display: inline-flex;
      gap: 6px;
    }
    .loader span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--teal);
      animation: bounce 0.8s infinite alternate;
    }
    .loader span:nth-child(2) { animation-delay: 0.2s; }
    .loader span:nth-child(3) { animation-delay: 0.4s; }

    /* ── ADD PROJECT MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 460px;
      margin: 1rem;
      animation: fadeUp 0.3s ease;
    }
    .modal h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 1.25rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 5px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      padding: 0.55rem 0.85rem;
      outline: none;
      transition: border 0.2s;
      resize: vertical;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--teal); }
    .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }
    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 0.5rem 1.1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      cursor: pointer;
    }
    .btn-submit {
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1.4rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: var(--teal-dark); }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--teal);
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
      font-size: 0.86rem;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 999;
      display: none;
      animation: fadeUp 0.3s ease;
    }
    .toast.error { border-left-color: var(--rejected); }
    .toast.show { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      from { transform: translateY(0); opacity: 0.5; }
      to   { transform: translateY(-8px); opacity: 1; }
    }

    @media (max-width: 700px) {
      .sidebar { display: none; }
      .main { padding: 1.25rem; }
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="logo">SK <span>Linaw</span></div>
  <a class="nav-item active" href="#">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Dashboard
  </a>
  <a class="nav-item" href="#">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
    My Projects
  </a>
  <a class="nav-item" href="#">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
    Budget
  </a>
  <a class="nav-item" href="#">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
    Committee
  </a>
  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="avatar" id="avatarInitial">?</div>
      <div class="user-info">
        <div class="user-name" id="sidebarName">Loading…</div>
        <div class="user-role" id="sidebarBarangay">—</div>
      </div>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="page-title">Committee Dashboard</div>
  <div class="page-subtitle">Track projects, spending, and budget for your committee.</div>

  <!-- Budget Overview -->
  <div class="budget-section">
    <div class="section-heading">Budget Overview</div>
    <div class="budget-card" id="budgetCard">
      <div style="color:var(--muted);font-size:0.85rem">Select a committee to see budget details.</div>
    </div>
  </div>

  <!-- Project List -->
  <div>
    <div class="section-heading">Projects</div>
    <div class="filter-bar">
      <select id="committeeFilter" onchange="onCommitteeChange()">
        <option value="">Loading committees…</option>
      </select>
      <select id="statusFilter" onchange="applyFilters()">
        <option value="">All statuses</option>
        <option value="PENDING">Pending</option>
        <option value="APPROVED">Approved</option>
        <option value="REJECTED">Rejected</option>
      </select>
      <input type="text" id="searchInput" placeholder="Search projects…" oninput="applyFilters()"/>
      <button class="btn-add" onclick="openModal()">+ Add Project</button>
    </div>

    <div class="table-wrap">
      <table class="project-table">
        <thead>
          <tr>
            <th>Project Name</th>
            <th>Purpose</th>
            <th>Cost</th>
            <th>Status</th>
            <th>Date</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="projectTableBody">
          <tr class="loader-row"><td colspan="6"><div class="loader"><span></span><span></span><span></span></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ADD PROJECT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Add New Project</h2>
    <div class="form-group">
      <label>Project Name</label>
      <input type="text" id="formProjectName" placeholder="e.g. Basketball Court Renovation"/>
    </div>
    <div class="form-group">
      <label>Purpose</label>
      <textarea id="formPurpose" rows="2" placeholder="Brief description of the project's goal…"></textarea>
    </div>
    <div class="form-group">
      <label>Committee</label>
      <select id="formCommittee"></select>
    </div>
    <div class="form-group">
      <label>Total Cost (₱)</label>
      <input type="number" id="formCost" placeholder="0.00" min="0" step="0.01"/>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" onclick="submitProject()">Submit Project</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:8080/api';

  // ── SESSION (read from localStorage set at login) ──
  const session = {
    name:     localStorage.getItem('sk_name')     || 'Councilor',
    barangay: localStorage.getItem('sk_barangay') || 'Lahug'
  };

  // Update sidebar user info
  document.getElementById('sidebarName').textContent = session.name;
  document.getElementById('sidebarBarangay').textContent = session.barangay;
  document.getElementById('avatarInitial').textContent = session.name.charAt(0).toUpperCase();

  let allProjects = [];
  let committees  = [];

  // ── INIT ──
  async function init() {
    await loadCommittees();
    await loadProjects();
    await loadBudget();
  }

  async function loadCommittees() {
    try {
      const res = await fetch(`${API}/getCommittees?barangay=${encodeURIComponent(session.barangay)}`);
      committees = await res.json();

      const filter = document.getElementById('committeeFilter');
      const formSel = document.getElementById('formCommittee');
      filter.innerHTML = '<option value="">All committees</option>';
      formSel.innerHTML = '';

      committees.forEach(c => {
        filter.innerHTML += `<option value="${escHtml(c.name)}">${escHtml(c.name)}</option>`;
        formSel.innerHTML += `<option value="${escHtml(c.name)}">${escHtml(c.name)}</option>`;
      });
    } catch (e) {
      document.getElementById('committeeFilter').innerHTML = '<option>Could not load</option>';
    }
  }

  async function loadProjects(committeeName) {
    const tbody = document.getElementById('projectTableBody');
    tbody.innerHTML = `<tr class="loader-row"><td colspan="6"><div class="loader"><span></span><span></span><span></span></div></td></tr>`;

    try {
      allProjects = [];

      if (committeeName) {
        const res = await fetch(`${API}/getProjects?barangay=${encodeURIComponent(session.barangay)}&committeeName=${encodeURIComponent(committeeName)}`);
        const data = await res.json();
        if (Array.isArray(data)) allProjects = data.map(p => ({ ...p, committeeName }));
      } else {
        for (const c of committees) {
          const res = await fetch(`${API}/getProjects?barangay=${encodeURIComponent(session.barangay)}&committeeName=${encodeURIComponent(c.name)}`);
          const data = await res.json();
          if (Array.isArray(data)) data.forEach(p => allProjects.push({ ...p, committeeName: c.name }));
        }
      }
      applyFilters();
    } catch (e) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="6">⚠️ Could not connect to the server.</td></tr>`;
    }
  }

  async function loadBudget(committeeName) {
    try {
      const res = await fetch(`${API}/getBudget?barangay=${encodeURIComponent(session.barangay)}`);
      const data = await res.json();
      renderBudget(data, committeeName);
    } catch (e) {
      document.getElementById('budgetCard').innerHTML = `<div style="color:var(--muted);font-size:0.85rem">Budget data unavailable.</div>`;
    }
  }

  function renderBudget(data, filterCommittee) {
    let rows = data.committees || [];
    if (filterCommittee) rows = rows.filter(c => c.committeeName === filterCommittee);

    const totalBudget = data.totalBudget || 0;
    const totalSpent  = rows.reduce((s, c) => s + (c.spent || 0), 0);

    document.getElementById('budgetCard').innerHTML = `
      <div class="budget-top">
        <div>
          <div class="budget-total-label">Total SK Budget</div>
          <div class="budget-total-value">₱${totalBudget.toLocaleString('en-PH')}</div>
        </div>
        <div class="budget-meta">
          Spent: ₱${totalSpent.toLocaleString('en-PH')}<br>
          Remaining: ₱${(totalBudget - totalSpent).toLocaleString('en-PH')}
        </div>
      </div>
      <div class="committee-rows">
        ${rows.map(c => {
          const pct = c.allocated > 0 ? Math.min((c.spent / c.allocated) * 100, 100) : 0;
          const over = c.spent > c.allocated;
          return `
            <div class="committee-row">
              <div class="committee-row-header">
                <span class="committee-row-name">${escHtml(c.committeeName)}</span>
                <span class="committee-row-amounts">₱${(c.spent||0).toLocaleString('en-PH')} / ₱${(c.allocated||0).toLocaleString('en-PH')}</span>
              </div>
              <div class="progress-track">
                <div class="progress-fill ${over ? 'over' : ''}" style="width:${pct}%"></div>
              </div>
            </div>`;
        }).join('')}
        ${rows.length === 0 ? '<div style="color:var(--muted);font-size:0.82rem">No budget data for this committee yet.</div>' : ''}
      </div>
    `;
  }

  function applyFilters() {
    const status = document.getElementById('statusFilter').value;
    const search = document.getElementById('searchInput').value.toLowerCase();
    let filtered = allProjects;
    if (status) filtered = filtered.filter(p => p.status === status);
    if (search) filtered = filtered.filter(p =>
      p.projectName.toLowerCase().includes(search) ||
      (p.purpose || '').toLowerCase().includes(search)
    );
    renderTable(filtered);
  }

  function renderTable(projects) {
    const tbody = document.getElementById('projectTableBody');
    if (projects.length === 0) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="6">No projects found.</td></tr>`;
      return;
    }
    tbody.innerHTML = projects.map((p, i) => `
      <tr style="animation-delay:${i * 0.04}s">
        <td class="project-name-cell">${escHtml(p.projectName)}</td>
        <td class="project-purpose-cell">${escHtml(p.purpose || '—')}</td>
        <td class="cost-cell">₱${(p.totalCost||0).toLocaleString('en-PH')}</td>
        <td><span class="status-pill status-${p.status}">${p.status}</span></td>
        <td style="color:var(--muted);font-size:0.78rem">${formatDate(p.createdAt)}</td>
        <td><button class="action-btn" onclick="viewProject(${p.id})">View</button></td>
      </tr>
    `).join('');
  }

  function onCommitteeChange() {
    const val = document.getElementById('committeeFilter').value;
    loadProjects(val || null);
    loadBudget(val || null);
  }

  // ── ADD PROJECT MODAL ──
  function openModal() {
    document.getElementById('modalOverlay').classList.add('open');
  }
  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  async function submitProject() {
    const body = {
      projectName:   document.getElementById('formProjectName').value.trim(),
      purpose:       document.getElementById('formPurpose').value.trim(),
      committeeName: document.getElementById('formCommittee').value,
      barangay:      session.barangay,
      councilorName: session.name,
      totalCost:     parseFloat(document.getElementById('formCost').value) || 0
    };

    if (!body.projectName || !body.purpose || !body.committeeName) {
      showToast('Please fill in all required fields.', true);
      return;
    }

    try {
      const res  = await fetch(`${API}/addProject`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const text = await res.text();

      if (text === 'SUCCESS') {
        showToast('Project submitted! Awaiting chairman approval.');
        closeModal();
        // Reset form
        ['formProjectName','formPurpose','formCost'].forEach(id => document.getElementById(id).value = '');
        await loadProjects(document.getElementById('committeeFilter').value || null);
      } else {
        showToast('Submission failed: ' + text, true);
      }
    } catch (e) {
      showToast('Could not connect to server.', true);
    }
  }

  function viewProject(id) {
    // Placeholder — expand to open a detail modal
    alert(`Viewing project ID: ${id}\n(Connect to your project detail endpoint here.)`);
  }

  // ── HELPERS ──
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatDate(str) {
    if (!str) return '—';
    try { return new Date(str).toLocaleDateString('en-PH', { year:'numeric', month:'short', day:'numeric' }); }
    catch { return str; }
  }

  // Close modal on overlay click
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  init();
</script>
</body>
</html>
