<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SK Approval Management</title>
<link rel="stylesheet" href="Developer.css">
</head>
<body>

<h2>SK Approval Management</h2>

<label>Filter by status:
  <select id="filter">
    <option value="All">All</option>
    <option value="Pending">Pending</option>
    <option value="Approved">Approved</option>
    <option value="Rejected">Rejected</option>
  </select>
</label>
<button id="refreshBtn">⟳ Refresh</button>

<table id="usersTable">
  <thead>
    <tr>
      <th>ID</th>
      <th>Username</th>
      <th>Barangay</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div id="status"></div>

<script src="Developer.js"></script>
</body>
</html>
