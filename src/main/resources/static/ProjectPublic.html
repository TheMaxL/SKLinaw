<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SK Linaw – Project List</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --teal:      #0BBFB5;
      --teal-dark: #089991;
      --teal-dim:  rgba(11,191,181,0.08);
      --bg:        #F0F7F7;
      --surface:   #FFFFFF;
      --border:    #D2ECEB;
      --text:      #0D2B2A;
      --muted:     #5A8A88;
      --approved:  #10B981;
      --star-on:   #F59E0B;
      --star-off:  #D2ECEB;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    
    header { background: var(--text); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--teal); }
    .logo span { color: #fff; }
    .header-nav { display: flex; gap: 0.75rem; align-items: center; }
    .nav-link { color: #7AADAB; font-size: 0.82rem; text-decoration: none; transition: color 0.2s; }
    .nav-link:hover { color: var(--teal); }
    .btn-sk { background: var(--teal); color: #fff; border: none; border-radius: 7px; padding: 0.42rem 1rem; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem; cursor: pointer; text-decoration: none; transition: background 0.2s; }
    .btn-sk:hover { background: var(--teal-dark); }

    
    .hero { background: var(--text); padding: 3rem 2rem; text-align: center; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 130%, rgba(11,191,181,0.16) 0%, transparent 70%); pointer-events: none; }
    .hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(1.6rem, 4vw, 2.5rem); font-weight: 800; color: #fff; position: relative; }
    .hero h1 em { font-style: normal; color: var(--teal); }
    .hero p { color: #7AADAB; font-size: 0.95rem; margin-top: 0.65rem; font-weight: 300; position: relative; }

    
    .filter-wrap { max-width: 860px; margin: -22px auto 0; padding: 0 1.5rem; position: relative; z-index: 10; }
    .filter-card { background: var(--surface); border-radius: 14px; padding: 1.1rem 1.4rem; box-shadow: 0 4px 20px rgba(0,0,0,0.07); display: flex; gap: 0.85rem; flex-wrap: wrap; align-items: flex-end; }
    .filter-group { flex: 1; min-width: 140px; }
    .filter-group label { display: block; font-size: 0.72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
    .filter-group select,
    .filter-group input { border: 1.5px solid var(--border); border-radius: 8px; padding: 0.5rem 0.8rem; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.2s; width: 100%; }
    .filter-group select:focus,
    .filter-group input:focus { border-color: var(--teal); }

    
    .main { max-width: 860px; margin: 2rem auto; padding: 0 1.5rem 4rem; }

    
    .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.85rem; margin-bottom: 1.5rem; }
    .stat-chip { background: var(--surface); border: 1.5px solid var(--border); border-radius: 11px; padding: 0.9rem 1.1rem; text-align: center; animation: fadeUp 0.4s ease both; }
    .stat-chip:nth-child(2) { animation-delay: 0.06s; }
    .stat-chip:nth-child(3) { animation-delay: 0.12s; }
    .stat-val { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--teal); }
    .stat-lbl { font-size: 0.72rem; color: var(--muted); }

    
    .section-lbl { font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 0.75rem; }

    .project-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; margin-bottom: 1rem; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s; animation: fadeUp 0.35s ease both; }
    .project-card:hover { border-color: var(--teal); box-shadow: 0 4px 20px rgba(11,191,181,0.1); }

    
    .card-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; gap: 1rem; cursor: pointer; }
    .card-title-block { flex: 1; min-width: 0; }
    .card-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.98rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }
    .card-meta span { margin-right: 0.65rem; }
    .card-right { display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
    .card-cost { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; color: var(--teal); white-space: nowrap; }

    
    .star-inline { display: flex; align-items: center; gap: 3px; }
    .star-inline .star { font-size: 0.85rem; color: var(--star-off); }
    .star-inline .star.on { color: var(--star-on); }
    .star-inline .score-val { font-size: 0.72rem; font-weight: 700; color: var(--muted); margin-left: 3px; }

    .chevron { color: var(--muted); transition: transform 0.25s; flex-shrink: 0; }
    .project-card.open .chevron { transform: rotate(180deg); }

    
    .card-body { display: none; border-top: 1.5px solid var(--border); }
    .project-card.open .card-body { display: block; animation: fadeDown 0.25s ease; }

    
    .card-details { padding: 1rem 1.25rem; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem 2rem; margin-bottom: 1rem; }
    .detail-item label { font-size: 0.68rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
    .detail-item p { font-size: 0.86rem; margin-top: 2px; }

    
    .docs-section { padding: 1rem 1.25rem; border-top: 1.5px solid var(--border); background: var(--bg); }
    .docs-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 0.85rem; }
    .docs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 0.65rem; }

    
    .doc-thumb { border-radius: 9px; overflow: hidden; border: 1.5px solid var(--border); background: var(--surface); aspect-ratio: 1; cursor: pointer; transition: border-color 0.2s, transform 0.15s; }
    .doc-thumb:hover { border-color: var(--teal); transform: scale(1.03); }
    .doc-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    
    .doc-pdf { border-radius: 9px; border: 1.5px solid var(--border); background: var(--surface); padding: 0.65rem 0.75rem; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.4rem; cursor: pointer; text-decoration: none; transition: border-color 0.2s, background 0.2s; aspect-ratio: 1; }
    .doc-pdf:hover { border-color: var(--teal); background: var(--teal-dim); }
    .doc-pdf-icon { font-size: 1.6rem; }
    .doc-pdf-name { font-size: 0.62rem; color: var(--muted); text-align: center; word-break: break-word; line-height: 1.3; }

    .docs-empty { font-size: 0.8rem; color: var(--muted); font-style: italic; }

    
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 999; align-items: center; justify-content: center; padding: 1.5rem; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 10px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .lightbox-close { position: fixed; top: 1.25rem; right: 1.5rem; background: rgba(255,255,255,0.15); border: none; color: #fff; font-size: 1.5rem; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .lightbox-close:hover { background: rgba(255,255,255,0.28); }

    
    .score-section { padding: 1rem 1.25rem; border-top: 1.5px solid var(--border); }
    .score-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.85rem; flex-wrap: wrap; gap: 0.5rem; }
    .score-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    .score-summary { display: flex; align-items: center; gap: 0.75rem; }
    .score-big { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--text); line-height: 1; }
    .score-stars-big { display: flex; gap: 3px; }
    .score-stars-big .star { font-size: 1.2rem; color: var(--star-off); }
    .score-stars-big .star.on { color: var(--star-on); }
    .score-votes { font-size: 0.75rem; color: var(--muted); }

    
    .score-breakdown { display: flex; flex-direction: column; gap: 4px; margin-bottom: 1rem; }
    .breakdown-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; }
    .breakdown-lbl { width: 12px; color: var(--muted); text-align: right; flex-shrink: 0; }
    .breakdown-star { color: var(--star-on); font-size: 0.72rem; flex-shrink: 0; }
    .breakdown-track { flex: 1; height: 6px; background: var(--bg); border-radius: 99px; overflow: hidden; }
    .breakdown-fill { height: 100%; background: var(--star-on); border-radius: 99px; transition: width 0.5s ease; }
    .breakdown-count { width: 20px; text-align: right; color: var(--muted); flex-shrink: 0; }

    
    .rate-label { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.5rem; }
    .star-input { display: flex; gap: 4px; margin-bottom: 0.65rem; }
    .star-input .star-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--star-off); transition: color 0.15s, transform 0.1s; padding: 0; line-height: 1; }
    .star-input .star-btn:hover,
    .star-input .star-btn.selected { color: var(--star-on); }
    .star-input .star-btn:active { transform: scale(0.9); }
    .btn-rate { background: var(--teal); color: #fff; border: none; border-radius: 8px; padding: 0.48rem 1.2rem; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem; cursor: pointer; transition: background 0.2s; }
    .btn-rate:hover { background: var(--teal-dark); }
    .btn-rate:disabled { opacity: 0.5; cursor: not-allowed; }
    .rate-feedback { font-size: 0.78rem; margin-top: 0.4rem; display: none; }
    .rate-feedback.success { color: var(--approved); display: block; }
    .rate-feedback.error   { color: #EF4444;       display: block; }

    
    .empty-state { text-align: center; padding: 4rem 1rem; color: var(--muted); font-size: 0.9rem; }
    .loader { display: flex; justify-content: center; padding: 3rem; gap: 6px; }
    .loader span { width: 9px; height: 9px; border-radius: 50%; background: var(--teal); animation: bounce 0.8s infinite alternate; }
    .loader span:nth-child(2) { animation-delay: 0.2s; }
    .loader span:nth-child(3) { animation-delay: 0.4s; }
    .docs-loader { font-size: 0.78rem; color: var(--muted); }

    @keyframes fadeUp   { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounce   { from { transform: translateY(0); opacity: 0.5; } to { transform: translateY(-9px); opacity: 1; } }

    @media (max-width: 560px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
      .docs-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">SK <span>Linaw</span></div>
  <div class="header-nav">
    <a class="nav-link" href="../Homepage/homepage.html">Home</a>
    <a class="nav-link" href="../Budget/budget-public.html">Budget</a>
    <a class="nav-link" href="../Feedback/feedback.html">Feedback</a>
    <a class="btn-sk" href="../Log-in/login.html">SK Login</a>
  </div>
</header>

<div class="hero">
  <h1>SK <em>Project List</em></h1>
  <p>Browse all implemented programs, view supporting documents, and rate each project.</p>
</div>

<div class="filter-wrap">
  <div class="filter-card">
    <div class="filter-group">
      <label>Committee</label>
      <select id="committeeFilter" onchange="applyFilters()">
        <option value="">All committees</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Search</label>
      <input type="text" id="searchInput" placeholder="Search projects…" oninput="applyFilters()"/>
    </div>
  </div>
</div>

<div class="main">
  <div class="stats-row" id="statsRow" style="display:none">
    <div class="stat-chip"><div class="stat-val" id="stTotal">0</div><div class="stat-lbl">Total Projects</div></div>
    <div class="stat-chip"><div class="stat-val" id="stCost">₱0</div><div class="stat-lbl">Total Expenditure</div></div>
    <div class="stat-chip"><div class="stat-val" id="stRating">—</div><div class="stat-lbl">Avg Public Rating</div></div>
  </div>
  <div class="section-lbl" id="sectionLbl" style="display:none">Published Projects</div>
  <div id="projectList">
    <div class="loader"><span></span><span></span><span></span></div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="Document"/>
</div>

<script>
  const API      = 'http://localhost:8080/api';
  const BARANGAY = 'Lahug'; // ← update to match your client's barangay

  let allProjects  = [];
  let allScores    = {};   
  let committees   = [];

  
  async function init() {
    await Promise.all([loadProjects(), loadAllScores()]);
    renderStats();
    renderProjects(allProjects);
    document.getElementById('statsRow').style.display  = 'grid';
    document.getElementById('sectionLbl').style.display = 'block';
  }

  async function loadProjects() {
    try {
      const cRes = await fetch(`${API}/getCommittees?barangay=${encodeURIComponent(BARANGAY)}`);
      committees = await cRes.json();

      
      const sel = document.getElementById('committeeFilter');
      committees.forEach(c => {
        const o = document.createElement('option');
        o.value = o.textContent = c.name;
        sel.appendChild(o);
      });

      
      for (const c of committees) {
        const pRes = await fetch(`${API}/getProjects?barangay=${encodeURIComponent(BARANGAY)}&committeeName=${encodeURIComponent(c.name)}`);
        const ps   = await pRes.json();
        if (Array.isArray(ps)) ps.filter(p => p.status === 'APPROVED').forEach(p => allProjects.push({ ...p, committeeName: c.name }));
      }
    } catch (e) {
      
      allProjects = [
        { id:1, projectName:'Basketball Court Renovation', committeeName:'Sports',      councilorName:'Juan Dela Cruz', totalCost:85000,  status:'APPROVED', createdAt:'2025-03-01' },
        { id:2, projectName:'School Supplies Drive',       committeeName:'Education',   councilorName:'Maria Santos',   totalCost:45000,  status:'APPROVED', createdAt:'2025-02-20' },
        { id:3, projectName:'Medical Mission',             committeeName:'Health',      councilorName:'Ana Gomez',      totalCost:60000,  status:'APPROVED', createdAt:'2025-02-14' },
      ];
      committees = [...new Set(allProjects.map(p => p.committeeName))].map(n => ({ name: n }));
      const sel = document.getElementById('committeeFilter');
      committees.forEach(c => {
        const o = document.createElement('option');
        o.value = o.textContent = c.name;
        sel.appendChild(o);
      });
    }
  }

  async function loadAllScores() {
    try {
      const res  = await fetch(`${API}/getAllProjectScores?barangay=${encodeURIComponent(BARANGAY)}`);
      allScores  = await res.json();
    } catch (e) {
      
      allScores = { 1: { average: 4.3, totalVotes: 12 }, 2: { average: 3.8, totalVotes: 7 }, 3: { average: 4.7, totalVotes: 20 } };
    }
  }

  
  function renderStats() {
    const cost    = allProjects.reduce((s, p) => s + (p.totalCost||0), 0);
    const ratings = Object.values(allScores).filter(s => s.totalVotes > 0).map(s => s.average);
    const avgRating = ratings.length ? (ratings.reduce((a,b) => a+b, 0) / ratings.length).toFixed(1) : '—';

    document.getElementById('stTotal').textContent  = allProjects.length;
    document.getElementById('stCost').textContent   = '₱' + cost.toLocaleString('en-PH');
    document.getElementById('stRating').textContent = avgRating !== '—' ? '⭐ ' + avgRating : '—';
  }

  
  function applyFilters() {
    const committee = document.getElementById('committeeFilter').value;
    const search    = document.getElementById('searchInput').value.toLowerCase();
    let filtered    = allProjects;
    if (committee) filtered = filtered.filter(p => p.committeeName === committee);
    if (search)    filtered = filtered.filter(p =>
      p.projectName.toLowerCase().includes(search) ||
      (p.purpose||'').toLowerCase().includes(search)
    );
    renderProjects(filtered);
  }

  
  function renderProjects(projects) {
    const listEl = document.getElementById('projectList');
    if (!projects.length) {
      listEl.innerHTML = `<div class="empty-state">No projects found for this selection.</div>`;
      return;
    }

    listEl.innerHTML = projects.map((p, i) => {
      const scoreData = allScores[p.id] || { average: 0, totalVotes: 0 };
      const avg       = parseFloat(scoreData.average) || 0;

      return `
        <div class="project-card" id="card-${p.id}" style="animation-delay:${i*0.05}s">

          
          <div class="card-header" onclick="toggleCard(${p.id})">
            <div class="card-title-block">
              <div class="card-name">${esc(p.projectName)}</div>
              <div class="card-meta">
                <span>📁 ${esc(p.committeeName)}</span>
                <span>👤 ${esc(p.councilorName)}</span>
                <span>📅 ${fmtDate(p.createdAt)}</span>
              </div>
            </div>
            <div class="card-right">
              <div class="card-cost">₱${(p.totalCost||0).toLocaleString('en-PH')}</div>
              
              <div class="star-inline" title="${avg.toFixed(1)} / 5 (${scoreData.totalVotes} votes)">
                ${[1,2,3,4,5].map(n => `<span class="star ${n <= Math.round(avg) ? 'on' : ''}">★</span>`).join('')}
                <span class="score-val">${scoreData.totalVotes > 0 ? avg.toFixed(1) : 'No ratings'}</span>
              </div>
              <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>

          
          <div class="card-body">

            
            <div class="card-details">
              <div class="detail-grid">
                <div class="detail-item"><label>Purpose</label><p>${esc(p.purpose||'—')}</p></div>
                <div class="detail-item"><label>Total Cost</label><p>₱${(p.totalCost||0).toLocaleString('en-PH')}</p></div>
                <div class="detail-item"><label>Committee</label><p>${esc(p.committeeName||'—')}</p></div>
                <div class="detail-item"><label>Submitted by</label><p>${esc(p.councilorName||'—')}</p></div>
              </div>
            </div>

            
            <div class="docs-section">
              <div class="docs-title">📎 Documents & Receipts</div>
              <div class="docs-grid" id="docs-${p.id}">
                <span class="docs-loader">Loading documents…</span>
              </div>
            </div>

            
            <div class="score-section" id="scoreSection-${p.id}">
              <div class="score-header">
                <div class="score-title">⭐ Public Rating</div>
                <div class="score-summary" id="scoreSummary-${p.id}">
                  <div class="score-big">${avg > 0 ? avg.toFixed(1) : '—'}</div>
                  <div>
                    <div class="score-stars-big">
                      ${[1,2,3,4,5].map(n => `<span class="star ${n <= Math.round(avg) ? 'on' : ''}">★</span>`).join('')}
                    </div>
                    <div class="score-votes">${scoreData.totalVotes} vote${scoreData.totalVotes !== 1 ? 's' : ''}</div>
                  </div>
                </div>
              </div>

              
              <div class="score-breakdown" id="breakdown-${p.id}"></div>

              
              <div class="rate-label">Rate this project:</div>
              <div class="star-input" id="starInput-${p.id}">
                ${[1,2,3,4,5].map(n =>
                  `<button class="star-btn" data-val="${n}"
                     onmouseover="hoverStars(${p.id}, ${n})"
                     onmouseout="unhoverStars(${p.id})"
                     onclick="selectStar(${p.id}, ${n})">★</button>`
                ).join('')}
              </div>
              <button class="btn-rate" id="rateBtn-${p.id}" onclick="submitScore(${p.id})" disabled>Submit Rating</button>
              <div class="rate-feedback" id="rateFeedback-${p.id}"></div>
            </div>

          </div>
        </div>`;
    }).join('');
  }

  
  function toggleCard(projectId) {
    const card   = document.getElementById(`card-${projectId}`);
    const isOpen = card.classList.contains('open');
    card.classList.toggle('open');
    if (!isOpen) {
      loadDocuments(projectId);
      loadScoreBreakdown(projectId);
    }
  }

  
  async function loadDocuments(projectId) {
    const docsEl = document.getElementById(`docs-${projectId}`);
    try {
      const res  = await fetch(`${API}/getProjectDocuments?projectId=${projectId}`);
      const docs = await res.json();

      if (!Array.isArray(docs) || docs.length === 0) {
        docsEl.innerHTML = `<span class="docs-empty">No documents uploaded yet.</span>`;
        return;
      }

      docsEl.innerHTML = docs.map(doc => {
        if (doc.fileType === 'image') {
          return `
            <div class="doc-thumb" onclick="openLightbox('${esc(doc.url)}')" title="${esc(doc.fileName)}">
              <img src="${esc(doc.url)}" alt="${esc(doc.fileName)}" loading="lazy"
                   onerror="this.parentElement.innerHTML='<div style=\\'display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:0.7rem\\'>No preview</div>'"/>
            </div>`;
        } else {
          return `
            <a class="doc-pdf" href="${esc(doc.url)}" target="_blank" title="${esc(doc.fileName)}">
              <span class="doc-pdf-icon">📄</span>
              <span class="doc-pdf-name">${esc(doc.fileName)}</span>
            </a>`;
        }
      }).join('');
    } catch (e) {
      docsEl.innerHTML = `<span class="docs-empty">Could not load documents.</span>`;
    }
  }

  
  function openLightbox(url) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightboxImg').src = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  
  async function loadScoreBreakdown(projectId) {
    const breakEl = document.getElementById(`breakdown-${projectId}`);
    try {
      const res  = await fetch(`${API}/getProjectScore?projectId=${projectId}`);
      const data = await res.json();
      const total = data.totalVotes || 0;

      if (total === 0) { breakEl.innerHTML = ''; return; }

      breakEl.innerHTML = [5,4,3,2,1].map(n => {
        const count = data.breakdown?.[n] || 0;
        const pct   = total > 0 ? (count / total * 100).toFixed(0) : 0;
        return `
          <div class="breakdown-row">
            <span class="breakdown-lbl">${n}</span>
            <span class="breakdown-star">★</span>
            <div class="breakdown-track"><div class="breakdown-fill" style="width:${pct}%"></div></div>
            <span class="breakdown-count">${count}</span>
          </div>`;
      }).join('');

      
      const avg = parseFloat(data.average) || 0;
      const sumEl = document.getElementById(`scoreSummary-${projectId}`);
      if (sumEl) {
        sumEl.querySelector('.score-big').textContent = avg > 0 ? avg.toFixed(1) : '—';
        sumEl.querySelectorAll('.score-stars-big .star').forEach((star, i) => {
          star.classList.toggle('on', i + 1 <= Math.round(avg));
        });
        sumEl.querySelector('.score-votes').textContent = `${total} vote${total !== 1 ? 's' : ''}`;
      }
    } catch (e) {
      breakEl.innerHTML = '';
    }
  }

  
  let selectedStars = {}; 

  function hoverStars(projectId, val) {
    document.querySelectorAll(`#starInput-${projectId} .star-btn`).forEach((btn, i) => {
      btn.style.color = i < val ? 'var(--star-on)' : 'var(--star-off)';
    });
  }
  function unhoverStars(projectId) {
    const selected = selectedStars[projectId] || 0;
    document.querySelectorAll(`#starInput-${projectId} .star-btn`).forEach((btn, i) => {
      btn.style.color = i < selected ? 'var(--star-on)' : 'var(--star-off)';
    });
  }
  function selectStar(projectId, val) {
    selectedStars[projectId] = val;
    unhoverStars(projectId);
    const rateBtn = document.getElementById(`rateBtn-${projectId}`);
    if (rateBtn) rateBtn.disabled = false;
  }

  async function submitScore(projectId) {
    const score   = selectedStars[projectId];
    const btn     = document.getElementById(`rateBtn-${projectId}`);
    const feedEl  = document.getElementById(`rateFeedback-${projectId}`);
    if (!score) return;

    btn.disabled = true;
    feedEl.className = 'rate-feedback';

    try {
      const res  = await fetch(`${API}/submitScore`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ projectId, barangay: BARANGAY, score })
      });
      const text = await res.text();
      if (text === 'SUCCESS') {
        feedEl.textContent  = '✓ Thank you for rating this project!';
        feedEl.className    = 'rate-feedback success';
        
        allScores[projectId] = allScores[projectId] || { average: score, totalVotes: 1 };
        loadScoreBreakdown(projectId);
        
        document.getElementById(`starInput-${projectId}`).style.pointerEvents = 'none';
      } else {
        feedEl.textContent = 'Could not submit rating: ' + text;
        feedEl.className   = 'rate-feedback error';
        btn.disabled = false;
      }
    } catch (e) {
      feedEl.textContent = '⚠️ Could not connect to server.';
      feedEl.className   = 'rate-feedback error';
      btn.disabled = false;
    }
  }

  
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function fmtDate(s) {
    if (!s) return '—';
    try { return new Date(s).toLocaleDateString('en-PH', { year:'numeric', month:'short', day:'numeric' }); }
    catch { return s; }
  }

  init();
</script>
</body>
</html>
