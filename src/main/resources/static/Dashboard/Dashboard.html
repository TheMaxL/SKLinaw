<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SK Linaw – Dashboard</title>
  <link rel="stylesheet" href="shared.css"/>
  <link rel="stylesheet" href="dashboard.css"/>
</head>
<body class="layout-sidebar">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">SK <span>Linaw</span></div>
    <div class="nav-section">Main</div>
    <button class="nav-item active" data-page="/Dashboard/dashboard.html">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <button class="nav-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
      Projects
    </button>
    <div class="nav-section">Committee</div>
    <button class="nav-item" data-page="/Committee/Committee.html">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      My Committee
    </button>
    <button class="nav-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      Budget
    </button>
    <div class="nav-section">More</div>
    <button class="nav-item" data-page="/Public-view/public.html">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      Public View
    </button>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="avatar" id="dash-avatar">?</div>
        <div>
          <div class="user-name"     id="dash-user-name">—</div>
          <div class="user-barangay" id="dash-barangay">—</div>
        </div>
      </div>
      <button class="nav-item" id="logout-btn" style="color:var(--rejected)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Log Out
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    <div class="topbar">
      <div class="greeting">
        Good day, <span id="dash-greet-name">—</span>!
        <small id="dash-greet-sub">SK Councilor</small>
      </div>
      <div class="topbar-date" id="dash-today"></div>
    </div>

    <div class="quick-stats">
      <div class="qs-card">
        <div class="qs-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg></div>
        <div class="qs-val" id="qs-total">—</div><div class="qs-lbl">My Projects</div>
      </div>
      <div class="qs-card">
        <div class="qs-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div class="qs-val" id="qs-pending">—</div><div class="qs-lbl">Pending Approval</div>
      </div>
      <div class="qs-card">
        <div class="qs-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="qs-val" id="qs-approved">—</div><div class="qs-lbl">Approved</div>
      </div>
      <div class="qs-card">
        <div class="qs-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
        <div class="qs-val" id="qs-budget">—</div><div class="qs-lbl">Budget Remaining</div>
      </div>
    </div>

    <div class="content-grid">
      <div class="panel">
        <div class="panel-title">
          Recent Projects
          <button>View all →</button>
        </div>
        <div id="recent-projects"><div class="loader"><span></span><span></span><span></span></div></div>
        <div class="quick-links">
          <button class="ql-btn"><span class="ql-icon">📋</span>All Projects</button>
          <button class="ql-btn"><span class="ql-icon">➕</span>Add Project</button>
          <button class="ql-btn"><span class="ql-icon">📊</span>Reports</button>
          <button class="ql-btn" onclick="location.href='public.html'"><span class="ql-icon">🌐</span>Public View</button>
        </div>
      </div>
      <div class="panel">
        <div class="panel-title">Committee Budget</div>
        <div id="budget-panel"><div class="loader"><span></span><span></span><span></span></div></div>
      </div>
    </div>
  </div>

<div class="toast" id="global-toast"></div>
<script src="shared.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
