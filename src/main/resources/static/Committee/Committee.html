<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SK Linaw – Committee Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="Committee.css"/>
  <link rel="stylesheet" href="shared.css"/>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-logo">SK <span>Linaw</span></div>

  <div class="nav-section">Main</div>

  <button class="nav-item" data-page="/Dashboard/dashboard.html">
    Dashboard
  </button>

  <button class="nav-item" data-page="/Project/Project.html">
    Projects
  </button>

  <div class="nav-section">Committee</div>

  <button class="nav-item active" data-page="/Committee/Committee.html">
    My Committee
  </button>

  <button class="nav-item" data-page="/Budget/Budget.html">
    Budget
  </button>

  <div class="nav-section">More</div>

  <button class="nav-item" data-page="/Public-view/public.html">
    Public View
  </button>

  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="avatar" id="dash-avatar">?</div>
      <div>
        <div class="user-name" id="dash-user-name">—</div>
        <div class="user-barangay" id="dash-barangay">—</div>
      </div>
    </div>

    <button class="nav-item" id="logout-btn">
      Log Out
    </button>
  </div>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="page-title">Committee members dashboards</div>
  <div class="page-subtitle">Tracks committees, committee members, and heads</div>

  <!-- Budget Overview -->
  <div class="budget-section">
    <div class="section-heading">Budget Overview</div>
    <div class="budget-card" id="budgetCard">
      <div style="color:var(--muted);font-size:0.85rem">Select a committee to see budget details.</div>
    </div>
  </div>

  <!-- Project List -->
  <div>
    <div class="section-heading">Committees</div>
    <div class="filter-bar">
      <select id="committeeFilter" onchange="onCommitteeChange()">
        <option value="">Loading committees…</option>
      </select>
      <select id="statusFilter" onchange="applyFilters()">
        <option value="">All statuses</option>
        <option value="PENDING">Pending</option>
        <option value="APPROVED">Approved</option>
        <option value="REJECTED">Rejected</option>
      </select>
      <input type="text" id="searchInput" placeholder="Search projects…" oninput="applyFilters()"/>
      <button class="btn-add" onclick="openModal()">+ Add Committees</button>
    </div>

    <div class="table-wrap">
      <table class="project-table">
        <thead>
          <tr>
            <th>Committee Name</th>
            <th>Members</th>
            <th>Head</th>
            <th>Budget</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="projectTableBody">
          <tr class="loader-row"><td colspan="6"><div class="loader"><span></span><span></span><span></span></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ADD PROJECT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Add New Committees</h2>
    <div class="form-group">
      <label>Committee Name</label>
      <input type="text" id="formProjectName" placeholder="e.g. Basketball Court Renovation"/>
    </div>
    <div class="form-group">
      <label>Head</label>
      <textarea id="formPurpose" rows="2" placeholder="Councilor in charge"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" onclick="submitCommittee()">Submit Committee</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script src="Committee.js"></script>
</body>
</html>
